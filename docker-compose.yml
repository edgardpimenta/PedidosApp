services:

  mongo:
    image: mongo:7
    container_name: mongo_pedidosapp
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - pedidosapp_network

  mongo-express:
    image: mongo-express
    container_name: mongo_express_pedidosapp
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongo
    networks:
      - pedidosapp_network      

networks:
  pedidosapp_network:
    driver: bridge

volumes:
  mongo_data: